name: Launch Readiness

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        required: false
        default: "candidate"
        type: choice
        options: ["candidate", "production"]
      android_version_name:
        description: "Android versionName (e.g. 1.8.0)"
        required: false
        type: string
      android_version_code:
        description: "Android versionCode (integer)"
        required: false
        type: string
      ios_version_name:
        description: "iOS short version (e.g. 1.8.0)"
        required: false
        type: string
      ios_build_number:
        description: "iOS build number (integer)"
        required: false
        type: string
      run_play_upload:
        description: "Upload Android bundles to Google Play"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      play_release_status:
        description: "Play release status"
        required: false
        default: "draft"
        type: choice
        options: ["draft", "inProgress", "completed"]
      play_user_fraction:
        description: "Required for inProgress (0.01-0.99)"
        required: false
        type: string
      play_completed_confirm:
        description: "Required for completed: APPROVE_PLAY_COMPLETED"
        required: false
        type: string
      run_ios_testflight:
        description: "Upload iOS IPA to TestFlight"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  preflight:
    name: Preflight web + quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/**
          if-no-files-found: error

  android-release-aab:
    name: Android signed AAB (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: preflight
    # Must match Play / TestFlight jobs so ANDROID_* secrets live in the same GitHub Environment
    environment: ${{ inputs.release_channel == 'production' && 'production-release' || 'mobile-release' }}
    strategy:
      fail-fast: false
      matrix:
        flavor: [staging, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing one or more Android signing secrets."
            exit 1
          fi

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Resolve Android version
        run: |
          VERSION_NAME_INPUT="${{ inputs.android_version_name }}"
          VERSION_CODE_INPUT="${{ inputs.android_version_code }}"
          RUN_NUMBER="${{ github.run_number }}"
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"

          if [ -n "$VERSION_NAME_INPUT" ]; then
            VERSION_NAME="$VERSION_NAME_INPUT"
          elif [ "$REF_TYPE" = "tag" ] && echo "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION_NAME="${REF_NAME#v}"
          else
            VERSION_NAME="1.0.${RUN_NUMBER}"
          fi

          if [ -n "$VERSION_CODE_INPUT" ]; then
            if ! echo "$VERSION_CODE_INPUT" | grep -Eq '^[0-9]+$'; then
              echo "android_version_code must be an integer."
              exit 1
            fi
            VERSION_CODE="$VERSION_CODE_INPUT"
          else
            VERSION_CODE="$RUN_NUMBER"
          fi

          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Capacitor sync
        run: |
          if [ "${{ matrix.flavor }}" = "staging" ]; then
            npm run mobile:sync:staging
          else
            npm run mobile:sync:prod
          fi

      - name: Build signed AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ matrix.flavor }}" = "staging" ]; then
            npm run mobile:android:bundle:staging
          else
            npm run mobile:android:bundle:prod
          fi

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.flavor }}-signed-aab
          path: android/app/build/outputs/bundle/**/*release*.aab
          if-no-files-found: error

  android-play:
    name: Android Play upload (${{ matrix.flavor }})
    if: ${{ inputs.run_play_upload == 'true' }}
    runs-on: ubuntu-latest
    needs: android-release-aab
    environment: ${{ inputs.release_channel == 'production' && 'production-release' || 'mobile-release' }}
    strategy:
      fail-fast: false
      matrix:
        flavor: [staging, prod]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-${{ matrix.flavor }}-signed-aab
          path: android-aab

      - name: Validate Play inputs
        run: |
          STATUS="${{ inputs.play_release_status }}"
          FRACTION="${{ inputs.play_user_fraction }}"
          CONFIRM="${{ inputs.play_completed_confirm }}"

          case "$STATUS" in
            draft|inProgress|completed) ;;
            *) echo "Invalid play_release_status: $STATUS"; exit 1 ;;
          esac

          if [ "$STATUS" = "inProgress" ]; then
            if [ -z "$FRACTION" ]; then
              echo "play_user_fraction is required when play_release_status=inProgress."
              exit 1
            fi
            if ! echo "$FRACTION" | grep -Eq '^0\.[0-9]+$'; then
              echo "play_user_fraction must be a decimal like 0.25."
              exit 1
            fi
          fi

          if [ "$STATUS" = "completed" ] && [ "$CONFIRM" != "APPROVE_PLAY_COMPLETED" ]; then
            echo "For completed releases, set play_completed_confirm=APPROVE_PLAY_COMPLETED."
            exit 1
          fi

      - name: Validate Play secrets
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_PACKAGE_NAME_STAGING: ${{ secrets.PLAY_PACKAGE_NAME_STAGING }}
          PLAY_PACKAGE_NAME_PROD: ${{ secrets.PLAY_PACKAGE_NAME_PROD }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ] || [ -z "$PLAY_PACKAGE_NAME_STAGING" ] || [ -z "$PLAY_PACKAGE_NAME_PROD" ]; then
            echo "Missing one or more Play publishing secrets."
            exit 1
          fi

      - name: Upload ${{ matrix.flavor }} AAB (draft/completed)
        if: ${{ inputs.play_release_status != 'inProgress' && matrix.flavor == 'staging' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME_STAGING }}
          releaseFiles: android-aab/**/*.aab
          track: internal
          status: ${{ inputs.play_release_status }}

      - name: Upload ${{ matrix.flavor }} AAB (draft/completed prod)
        if: ${{ inputs.play_release_status != 'inProgress' && matrix.flavor == 'prod' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME_PROD }}
          releaseFiles: android-aab/**/*.aab
          track: internal
          status: ${{ inputs.play_release_status }}

      - name: Upload ${{ matrix.flavor }} AAB (rollout staging)
        if: ${{ inputs.play_release_status == 'inProgress' && matrix.flavor == 'staging' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME_STAGING }}
          releaseFiles: android-aab/**/*.aab
          track: internal
          status: inProgress
          userFraction: ${{ inputs.play_user_fraction }}

      - name: Upload ${{ matrix.flavor }} AAB (rollout prod)
        if: ${{ inputs.play_release_status == 'inProgress' && matrix.flavor == 'prod' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME_PROD }}
          releaseFiles: android-aab/**/*.aab
          track: internal
          status: inProgress
          userFraction: ${{ inputs.play_user_fraction }}

  ios-simulator:
    name: iOS simulator sanity
    runs-on: macos-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Sync + build simulator app
        run: npm run mobile:sync:dev && npm run mobile:ios:build:sim
      - name: Package simulator app artifact
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent App.app App-simulator.zip
      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App-simulator.zip
          if-no-files-found: error

  ios-testflight:
    name: iOS TestFlight upload
    if: ${{ inputs.run_ios_testflight == 'true' }}
    runs-on: macos-latest
    needs: preflight
    environment: ${{ inputs.release_channel == 'production' && 'production-release' || 'mobile-release' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate iOS signing and ASC secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_UUID: ${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$IOS_P12_BASE64" ] || [ -z "$IOS_P12_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ] || [ -z "$IOS_PROVISIONING_PROFILE_UUID" ] || [ -z "$IOS_TEAM_ID" ] || [ -z "$IOS_CODE_SIGN_IDENTITY" ] || [ -z "$IOS_BUNDLE_IDENTIFIER" ] || [ -z "$ASC_API_KEY_ID" ] || [ -z "$ASC_API_ISSUER_ID" ] || [ -z "$ASC_API_PRIVATE_KEY_BASE64" ]; then
            echo "Missing one or more iOS signing/App Store Connect secrets."
            exit 1
          fi

      - name: Resolve iOS version/build
        run: |
          VERSION_NAME_INPUT="${{ inputs.ios_version_name }}"
          BUILD_NUMBER_INPUT="${{ inputs.ios_build_number }}"
          RUN_NUMBER="${{ github.run_number }}"
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"

          if [ -n "$VERSION_NAME_INPUT" ]; then
            VERSION_NAME="$VERSION_NAME_INPUT"
          elif [ "$REF_TYPE" = "tag" ] && echo "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION_NAME="${REF_NAME#v}"
          else
            VERSION_NAME="1.0.${RUN_NUMBER}"
          fi

          if [ -n "$BUILD_NUMBER_INPUT" ]; then
            if ! echo "$BUILD_NUMBER_INPUT" | grep -Eq '^[0-9]+$'; then
              echo "ios_build_number must be an integer."
              exit 1
            fi
            BUILD_NUMBER="$BUILD_NUMBER_INPUT"
          else
            BUILD_NUMBER="$RUN_NUMBER"
          fi

          echo "IOS_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Capacitor sync (prod profile)
        run: npm run mobile:sync:prod

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_UUID: ${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROVISIONING_PROFILE_UUID.mobileprovision"

      - name: Build iOS archive and export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          IOS_PROVISIONING_PROFILE_UUID: ${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $IOS_VERSION_NAME" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $IOS_BUILD_NUMBER" ios/App/App/Info.plist

          cat > ios/App/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$IOS_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_IDENTIFIER</key><string>$IOS_PROVISIONING_PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/build/App.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_UUID" \
            archive

          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/build/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-ipa
          path: ios/App/build/export/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/appstoreconnect/private_keys"
          echo "$ASC_API_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

          xcrun altool --upload-app \
            -f ios/App/build/export/App.ipa \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --apiKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys"

  launch-summary:
    name: Launch summary
    runs-on: ubuntu-latest
    needs: [preflight, android-release-aab, ios-simulator]
    if: ${{ always() }}
    steps:
      - name: Print launch readiness summary
        run: |
          echo "Launch readiness workflow finished."
          echo "Channel: ${{ inputs.release_channel }}"
          echo "Android Play upload requested: ${{ inputs.run_play_upload }}"
          echo "iOS TestFlight requested: ${{ inputs.run_ios_testflight }}"
          echo "Review artifacts and job results before launch."
